<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Proxim Admin — Connexion</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <style>
    :root { --primary:#0D1B2A; --gold:#F4A922; --gold-dark:#d4901a; --bg:#0a1520; --border:#1e3a5f; }
    body { background:var(--bg); min-height:100vh; display:flex; align-items:center; justify-content:center;
           font-family:'Segoe UI',system-ui,sans-serif; }
    .login-wrap { width:100%; max-width:420px; padding:24px; }
    .login-logo { text-align:center; margin-bottom:36px; }
    .login-logo .icon {
      width:64px; height:64px; background:var(--gold); border-radius:16px;
      display:inline-flex; align-items:center; justify-content:center;
      font-size:28px; font-weight:900; color:var(--primary); margin-bottom:14px;
      box-shadow:0 8px 30px rgba(244,169,34,0.4);
    }
    .login-logo h1 { color:white; font-size:26px; font-weight:800; margin:0; }
    .login-logo h1 span { color:var(--gold); }
    .login-logo p { color:#7a9bbf; font-size:13px; margin-top:6px; }
    .login-card {
      background:#112240; border:1px solid var(--border);
      border-radius:20px; padding:32px;
      box-shadow:0 20px 60px rgba(0,0,0,0.5);
    }
    .form-label { color:#a0b4c8; font-size:13px; font-weight:600; margin-bottom:6px; }
    .form-control {
      background:#0D1B2A; border:1px solid var(--border);
      color:white; border-radius:10px; padding:12px 16px;
      font-size:14px; transition:border-color 0.2s;
    }
    .form-control:focus {
      border-color:var(--gold); background:#0D1B2A; color:white;
      box-shadow:0 0 0 3px rgba(244,169,34,0.15);
    }
    .form-control::placeholder { color:#4a6480; }
    .input-group-text {
      background:#1a2e42; border:1px solid var(--border);
      color:#7a9bbf; border-radius:10px 0 0 10px;
    }
    .input-group .form-control { border-radius:0 10px 10px 0; }
    .btn-login {
      width:100%; padding:13px;
      background:linear-gradient(135deg,var(--gold),var(--gold-dark));
      color:var(--primary); border:none; border-radius:12px;
      font-size:15px; font-weight:700; cursor:pointer;
      transition:all 0.2s; margin-top:8px;
    }
    .btn-login:hover {
      transform:translateY(-2px);
      box-shadow:0 8px 25px rgba(244,169,34,0.4);
    }
    .alert-dark {
      background:rgba(239,68,68,0.12); border:1px solid rgba(239,68,68,0.3);
      color:#f87171; border-radius:10px; font-size:13px; padding:12px 16px;
    }
    .divider { text-align:center; color:#4a6480; font-size:12px; margin:16px 0; }
  </style>
</head>
<body>
  {% load django_bootstrap5 %}
  <div class="login-wrap">
    <div class="login-logo">
      <div class="icon">P</div>
      <h1>Proxim <span>Admin</span></h1>
      <p>Panneau d'administration sécurisé</p>
    </div>
    <div class="login-card">
      <h5 style="color:white;font-weight:700;margin-bottom:24px;">
        <i class="fas fa-lock" style="color:var(--gold);margin-right:8px;"></i>Connexion
      </h5>
      {% if messages %}
        {% for msg in messages %}
          <div class="alert-dark mb-3"><i class="fas fa-exclamation-circle me-2"></i>{{ msg }}</div>
        {% endfor %}
      {% endif %}
      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label">Adresse email</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-envelope"></i></span>
            <input type="email" name="email" class="form-control" placeholder="admin@proxim.bj" required/>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label">Mot de passe</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-key"></i></span>
            <input type="password" name="password" class="form-control" placeholder="••••••••" required/>
          </div>
        </div>
        <button type="submit" class="btn-login">
          <i class="fas fa-sign-in-alt me-2"></i>Accéder au dashboard
        </button>
      </form>
      <div class="divider mt-4">Accès réservé aux administrateurs Proxim</div>
    </div>
  </div>
</body>
</html>
